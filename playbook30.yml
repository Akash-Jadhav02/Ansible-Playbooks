---
- name: Configure apache2/httpd based on OS flavour
  hosts: all
  tasks:
    - name: Install apache2 on ubuntu servers using apt
      apt:
        name: apache2
        state: present
        update_cache: yes
      when: ansible_distribution == "Ubuntu"
    - name: Install httpd on Redhat servers using yum
      yum:
        name:  httpd
        state: present
        update_cache: yes
      when: ansible_distribution == "RedHat"
    - name: Edit the idnex.hmtl file
      copy:
        content: "IntelliQ"
        dest: /var/www/html/index.hmtl
    - name: Restart apache2 on ubuntu servers
      service:
        name: apache2
        state: restarted
      when: ansible_distribution == "Ubuntu"
    - name: Restart httpd on redhat servers
      service:
        name: httpd
        state: restarted
      when: ansible_distribution == "RedHat"
    - name: Check apache2/httpd response on all the servers
      uri:
        url: "{{item}}"
        status_code: 200
      with_items:
        - http://172.31.39.95
        - http://172.31.43.225
        - http://172.31.20.232
...
