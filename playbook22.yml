---
- name: Delete if the file is executable
  hosts: all
  tasks:
    - name: Capture file info
      stat:
        path: /tmp/file1
      register: b
    - name: Display output of the above module
      debug:
        var: b
    - name: Delete if the file has execute permissions
      file:
        name: /tmp/file1
        state: absent
      when: b.stat.executable == true
...      
